<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Inventra Auth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe, #43e97b);
            background-size: 400% 400%;
            animation: gradient 18s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 60px 60px;
            animation: float 25s linear infinite;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 50px 45px;
            border-radius: 30px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            width: 100%;
            max-width: 480px;
            position: relative;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .otp-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            text-align: center;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 38px;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e8e8e8;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
        }

        .step.completed .step-number {
            background: #28a745;
            color: white;
        }

        .step.active .step-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .step-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-align: center;
            line-height: 1.3;
        }

        .step.completed .step-label {
            color: #28a745;
        }

        .step.active .step-label {
            color: #667eea;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 600;
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .alert-error {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 1px solid #f1b0b7;
        }

        .alert-success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border: 1px solid #b1dfbb;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            color: #444;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.6;
        }

        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: #f9f9f9;
            font-weight: 500;
        }

        input[type="text"] {
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
            padding-left: 16px;
            font-weight: 700;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 45px rgba(102, 126, 234, 0.5);
        }

        .resend-info {
            margin-top: 25px;
            text-align: center;
            color: #888;
            font-size: 13px;
        }

        .resend-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .resend-link:hover {
            color: #764ba2;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 30px;
            }
            h2 {
                font-size: 28px;
            }
            input[type="text"] {
                font-size: 20px;
                letter-spacing: 6px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="otp-icon">🔐</div>
    <h2>Verify Email</h2>
    <p class="subtitle">
        Enter the 6-digit verification code sent to your email<br>
        <small style="color: #999; font-size: 13px; margin-top: 8px; display: block;">
            ⚠️ Your account data will be permanently stored only after email verification
        </small>
    </p>



    <!-- Error Message -->
    <div th:if="${error}" class="alert alert-error">
        <span>❌</span>
        <span th:text="${error}"></span>
    </div>

    <!-- Info Message for Pending Verification -->
    <div th:if="${email != null and error == null}" class="alert" style="background: linear-gradient(135deg, #fff3cd, #ffeaa7); color: #856404; border: 1px solid #ffeaa7; display: flex; align-items: center; gap: 10px;">
        <span>ℹ️</span>
        <span>Verification pending for: <strong th:text="${email}"></strong></span>
    </div>

    <!-- Success Message -->
    <div th:if="${success}" class="alert alert-success">
        <span>✅</span>
        <span th:text="${success}"></span>
    </div>

    <form action="/verify-otp" method="post">
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <span class="input-icon">✉️</span>
                <input type="email" id="email" name="email" required placeholder="Enter your email" th:value="${email}">
            </div>
        </div>

        <div class="form-group">
            <label for="otp">Verification Code</label>
            <input type="text" id="otp" name="otp" required placeholder="000000" maxlength="6" pattern="[0-9]{6}">
        </div>

        <button type="submit">
            <span style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span>Step 2: Verify & Create Account</span>
                <span style="font-size: 18px;">→</span>
            </span>
        </button>
    </form>

    <div class="resend-info">
        Didn't receive the code? <a href="/signup" class="resend-link">Go Back & Resend</a> or <a href="/" class="resend-link">Login</a>
    </div>
</div>
</body>
</html>
