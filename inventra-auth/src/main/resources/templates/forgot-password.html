<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Inventra Auth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe, #43e97b);
            background-size: 400% 400%;
            animation: gradient 18s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 60px 60px;
            animation: float 25s linear infinite;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 50px 45px;
            border-radius: 30px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            width: 100%;
            max-width: 480px;
            position: relative;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .forgot-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            text-align: center;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 38px;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
        }

        label {
            display: block;
            color: #444;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.6;
        }

        input[type="email"] {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: #f9f9f9;
            font-weight: 500;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 45px rgba(102, 126, 234, 0.5);
        }

        .links {
            margin-top: 28px;
            text-align: center;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
            padding: 5px 10px;
        }

        .links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: 0;
            left: 50%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: all 0.4s;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .links a:hover::after {
            width: 100%;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 30px;
            }
            h2 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="forgot-icon">🔑</div>
    <h2>Forgot Password?</h2>
    <p class="subtitle">No worries! Enter your email and we'll send you a reset link</p>

    <!-- Success Message -->
    <div th:if="${success}" style="padding: 12px; background: #d4edda; color: #155724; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 600;">
        <span th:text="${success}"></span>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" style="padding: 12px; background: #f8d7da; color: #721c24; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 600;">
        <span th:text="${error}"></span>
    </div>

    <form action="/forgot-password" method="post">
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <span class="input-icon">✉️</span>
                <input type="email" id="email" name="email" required placeholder="Enter your registered email">
            </div>
        </div>

        <button type="submit">Send Reset Link</button>
    </form>

    <div class="links">
        <a href="/">← Back to Login</a>
    </div>
</div>
</body>
</html>
